; Open EvE - PlatformIO project
;
; Two sketches live under src/:
;   src/eyes/eyes.ino             -> ESP32-S3 (OLED face)
;   src/speak/speech-to-text.ino  -> classic ESP32 (mic + Wi-Fi + Bluetooth A2DP)
;
; Each is built by its own environment. PlatformIO auto-discovers libraries
; placed under lib/ (so lib/ESP32-A2DP/ is pulled in automatically by the
; voice env). Pin the platform version so the legacy driver/i2s.h API used
; in the firmware stays available.
;
; Build:    pio run -e esp32-voice
; Upload:   pio run -e esp32-voice -t upload
; Monitor:  pio device monitor -e esp32-voice -b 115200

[platformio]
src_dir = src
default_envs = esp32-voice

; ---------------------------------------------------------------------------
; Voice agent: classic ESP32 (WROOM/WROVER). REQUIRED for Bluetooth A2DP.
; ---------------------------------------------------------------------------
[env:esp32-voice]
platform = espressif32@^6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Bluetooth Classic + Wi-Fi + TLS together blow past the default app slot.
board_build.partitions = huge_app.csv

; Only compile the voice sketch in this environment.
build_src_filter = +<speak/> -<eyes/> -<backend/>

; Enable PSRAM use if a WROVER is attached (allocator falls back gracefully
; on stock WROOM). -DCORE_DEBUG_LEVEL=3 turns on warnings/errors only.
build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DCORE_DEBUG_LEVEL=3

lib_deps =
  ; ESP32-A2DP is also available locally at lib/ESP32-A2DP/ for offline builds.
  pschatzmann/ESP32-A2DP@^1.8.10

; ---------------------------------------------------------------------------
; Eyes face: ESP32-S3 (OLED + RoboEyes).
; ---------------------------------------------------------------------------
[env:esp32-eyes]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_src_filter = +<eyes/> -<speak/> -<backend/>

lib_deps =
  adafruit/Adafruit GFX Library@^1.11.10
  adafruit/Adafruit SSD1306@^2.5.10
  https://github.com/FluxGarage/RoboEyes.git
